#Fill in the mentioned values and rename the file to application-dev.yml to get started locally
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/airbnb
    username: your_db_username
    password: your_db_password
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update


jwt:
  secret:
    key: your_jwt_secret

stripe:
  secret:
    key: your_stripe_test_key
  webhook:
    secret: your_stripe_webhook_secret

base:
  url: http://localhost:8080/api/v1