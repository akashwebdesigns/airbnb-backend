<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Successful — AirBnb</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-deep:   #0a4a3a;
      --green-mid:    #0f7a5a;
      --green-vivid:  #1db87a;
      --green-glow:   #4fffb0;
      --cream:        #f5f0e8;
      --card-bg:      #ffffff;
      --text-primary: #0d2b20;
      --text-muted:   #5a7a6e;
      --border:       rgba(29,184,122,0.18);
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--green-deep);
      overflow-x: hidden;
    }

    /* ── animated mesh background ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%,  rgba(29,184,122,0.28) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 80%,  rgba(79,255,176,0.14) 0%, transparent 55%),
        radial-gradient(ellipse 100% 100% at 50% 50%, #0a4a3a 0%, #062a20 100%);
      z-index: 0;
    }

    /* floating blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
      animation: drift 14s ease-in-out infinite alternate;
    }
    .blob-1 { width: 420px; height: 420px; background: var(--green-vivid); top: -120px; right: -100px; animation-delay: 0s; }
    .blob-2 { width: 300px; height: 300px; background: var(--green-glow);  bottom: -80px; left: -80px;  animation-delay: -5s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.08); }
    }

    /* ── layout ── */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 20px;
    }

    /* ── card ── */
    .card {
      background: var(--card-bg);
      border-radius: 28px;
      padding: 56px 52px 48px;
      max-width: 520px; width: 100%;
      box-shadow:
        0 0 0 1px var(--border),
        0 40px 80px rgba(0,0,0,0.35),
        0 0 60px rgba(29,184,122,0.12);
      text-align: center;
      animation: slideUp 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1);    }
    }

    /* ── icon ring ── */
    .icon-wrap {
      width: 96px; height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e6fff4 0%, #c8fde4 100%);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
      position: relative;
      animation: popIn 0.6s 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.4); }
      to   { opacity: 1; transform: scale(1);   }
    }

    .icon-wrap::before {
      content: '';
      position: absolute; inset: -6px;
      border-radius: 50%;
      border: 2px dashed rgba(29,184,122,0.35);
      animation: spin 16s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .icon-wrap svg { width: 44px; height: 44px; }

    /* ── typography ── */
    .headline {
      font-family: 'Fraunces', serif;
      font-size: 2rem;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
      animation: fadeIn 0.5s 0.55s both;
    }

    .subtitle {
      font-size: 0.95rem;
      color: var(--text-muted);
      line-height: 1.6;
      font-weight: 300;
      max-width: 340px;
      margin: 0 auto 32px;
      animation: fadeIn 0.5s 0.65s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    /* ── booking pill ── */
    .booking-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #f0fdf7;
      border: 1.5px solid rgba(29,184,122,0.3);
      border-radius: 100px;
      padding: 10px 20px;
      margin-bottom: 36px;
      animation: fadeIn 0.5s 0.75s both;
    }

    .booking-badge .label {
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .booking-badge .value {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--green-mid);
      font-family: 'DM Sans', monospace;
    }

    .booking-badge .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green-vivid);
    }

    /* ── divider ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(29,184,122,0.2), transparent);
      margin: 0 0 32px;
      animation: fadeIn 0.5s 0.8s both;
    }

    /* ── info rows ── */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 36px;
      animation: fadeIn 0.5s 0.85s both;
    }

    .info-item {
      background: #f8fffe;
      border: 1px solid rgba(29,184,122,0.12);
      border-radius: 14px;
      padding: 14px 16px;
      text-align: left;
    }

    .info-item .key {
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .info-item .val {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text-primary);
    }

    /* ── CTA button ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--green-mid) 0%, var(--green-vivid) 100%);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 14px 32px;
      border-radius: 100px;
      text-decoration: none;
      border: none; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 6px 24px rgba(29,184,122,0.35);
      animation: fadeIn 0.5s 0.95s both;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(29,184,122,0.45);
    }

    .btn:active { transform: translateY(0); }

    /* ── brand footer ── */
    .brand {
      margin-top: 36px;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.04em;
      animation: fadeIn 0.5s 1.1s both;
    }

    /* ── confetti burst (CSS only) ── */
    .confetti-wrap {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 2;
      overflow: hidden;
    }

    .confetti-piece {
      position: absolute;
      top: -20px;
      width: 8px; height: 14px;
      border-radius: 2px;
      opacity: 0;
      animation: fall 2s ease-in forwards;
    }

    @keyframes fall {
      0%   { opacity: 1; transform: translateY(0)    rotate(0deg);   }
      100% { opacity: 0; transform: translateY(110vh) rotate(720deg); }
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <!-- confetti pieces injected by JS -->
  <div class="confetti-wrap" id="confetti"></div>

  <div class="page">
    <div class="card">

      <div class="icon-wrap">
        <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="22" cy="22" r="22" fill="url(#g1)"/>
          <path d="M13 22.5l6.5 6.5 11-13" stroke="#0f7a5a" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="g1" x1="0" y1="0" x2="44" y2="44">
              <stop stop-color="#c8fde4"/>
              <stop offset="1" stop-color="#a0f5cc"/>
            </linearGradient>
          </defs>
        </svg>
      </div>

      <h1 class="headline">Booking Confirmed!</h1>
      <p class="subtitle">Your payment was processed successfully. Get ready for an amazing stay — your host has been notified.</p>

      <div class="booking-badge">
        <span class="dot"></span>
        <span class="label">Booking ID</span>
        <span class="value" id="bookingId">#—</span>
      </div>

      <div class="divider"></div>

      <div class="info-grid">
        <div class="info-item">
          <div class="key">Status</div>
          <div class="val" style="color: #0f7a5a;">✓ Paid</div>
        </div>
        <div class="info-item">
          <div class="key">Date</div>
          <div class="val" id="paymentDate">—</div>
        </div>
      </div>
    </div>

    <p class="brand">AirBnb &nbsp;·&nbsp; Secure Payments</p>
  </div>

  <script>
    // Read bookingId from URL
    const params = new URLSearchParams(window.location.search);
    const bookingId = params.get('bookingId');
    if (bookingId) {
      document.getElementById('bookingId').textContent = '#' + bookingId;
    }

    // Set today's date
    document.getElementById('paymentDate').textContent =
      new Date().toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' });

    // Confetti burst
    const colors = ['#1db87a','#4fffb0','#0f7a5a','#a0f5cc','#ffffff','#ffe066'];
    const wrap = document.getElementById('confetti');
    for (let i = 0; i < 60; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.cssText = `
        left: ${Math.random() * 100}%;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        width: ${6 + Math.random() * 6}px;
        height: ${10 + Math.random() * 10}px;
        border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
        animation-delay: ${Math.random() * 1.2}s;
        animation-duration: ${1.6 + Math.random() * 1.2}s;
      `;
      wrap.appendChild(el);
    }
  </script>
</body>
</html>
